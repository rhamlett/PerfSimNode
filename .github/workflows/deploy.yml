name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: perfsimnode
  NODE_VERSION: '24'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Create deployment package
        run: |
          # Create deployment structure with dist folder intact
          mkdir -p deploy
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r dist deploy/
          
          # Install production dependencies
          cd deploy
          npm ci --omit=dev
          
          # Zip for deployment
          zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service for built-in Node.js on Linux
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Unable to resolve resource group for app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi

          # Ensure App Service uses built-in Node.js runtime instead of container image.
          az webapp config set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "$RESOURCE_GROUP" \
            --linux-fx-version "NODE|${{ env.NODE_VERSION }}-lts"

          # Remove container-specific app settings if they exist.
          az webapp config appsettings delete \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names WEBSITES_PORT DOCKER_REGISTRY_SERVER_URL DOCKER_REGISTRY_SERVER_USERNAME DOCKER_REGISTRY_SERVER_PASSWORD || true

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy.zip
